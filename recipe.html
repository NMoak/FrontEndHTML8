<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --bg-deep: #0d1117;
            --bg-panel: #161b22;
            --bg-callout: #1f2937;
            --border-dim: #30363d;
            --text-bright: #e6edf3;
            --text-dimmer: #8b949e;
            --blue: #58a6ff;
            --cyan: #00d4ff;
            --purple: #7c3aed;
        }
        .navbar { background-color: var(--bg-panel) !important; border-bottom: 2px solid var(--blue); }
        .navbar-brand { color: var(--cyan) !important; font-weight: 700; }
        .nav-link { color: var(--text-bright) !important; border-radius: 4px; transition: background-color 0.3s ease, color 0.3s ease; }
        .nav-link:hover { background-color: var(--cyan) !important; color: var(--bg-deep) !important; }
        .navbar-toggler { border-color: var(--blue); }
        .navbar-toggler-icon { filter: invert(1); }
        .button-nano {
            background-color: var(--purple); color: var(--text-bright); border: 1px solid var(--purple);
            transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease, transform 0.15s ease;
        }
        .button-nano:hover { background-color: var(--cyan); color: var(--bg-deep); border-color: var(--cyan); }
        .button-nano:active { transform: scale(0.96); }
        .button-nano-ghost {
            background-color: transparent; color: var(--cyan); border: 1px solid var(--cyan);
            transition: background-color 0.25s ease, color 0.25s ease, transform 0.15s ease;
        }
        .button-nano-ghost:hover { background-color: var(--cyan); color: var(--bg-deep); }
        .button-nano-ghost:active { transform: scale(0.96); }

        .detail-img {
            width: 100%; max-height: 400px; object-fit: cover;
            border-radius: 8px; border: 1px solid var(--border-dim);
            margin-bottom: 1.5rem;
        }
        .detail-img-thumb {
            width: 80px; height: 80px; object-fit: cover;
            border-radius: 6px; border: 2px solid transparent;
            cursor: pointer; transition: border-color 0.2s ease;
        }
        .detail-img-thumb.active, .detail-img-thumb:hover { border-color: var(--cyan); }
        .thumb-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }

        .meta-badge {
            display: inline-block; font-size: 0.8rem; padding: 4px 12px;
            border-radius: 20px; margin: 3px; background: var(--bg-callout);
            border: 1px solid var(--border-dim); color: var(--text-bright);
        }
        .dietary-badge {
            display: inline-block; font-size: 0.8rem; padding: 4px 12px;
            border-radius: 20px; margin: 3px; background: var(--purple);
            color: var(--text-bright);
        }
        .ingredients-list { list-style: none; padding: 0; }
        .ingredients-list li {
            padding: 8px 0; border-bottom: 1px solid var(--border-dim);
            color: var(--text-bright); font-size: 0.95rem;
        }
        .ingredients-list li::before { content: "•  "; color: var(--cyan); }

        .step-item {
            display: flex; gap: 1rem; align-items: flex-start;
            margin-bottom: 1rem; padding: 1rem;
            background: var(--bg-callout); border-radius: 8px;
            border: 1px solid var(--border-dim);
            transition: border-color 0.2s ease;
        }
        .step-item:hover { border-color: var(--blue); }
        .step-num {
            min-width: 32px; height: 32px; border-radius: 50%;
            background: var(--purple); color: var(--text-bright);
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 0.85rem; flex-shrink: 0;
        }
        .step-text { color: var(--text-bright); font-size: 0.95rem; line-height: 1.6; padding-top: 4px; }

        .fav-btn-detail {
            background: none; border: 2px solid var(--text-dimmer);
            border-radius: 8px; padding: 8px 20px; cursor: pointer;
            color: var(--text-dimmer); font-size: 1rem;
            transition: border-color 0.25s ease, color 0.25s ease, transform 0.15s ease;
        }
        .fav-btn-detail:hover { border-color: #d4537e; color: #d4537e; }
        .fav-btn-detail:active { transform: scale(0.96); }
        .fav-btn-detail.active { border-color: #d4537e; color: #d4537e; }
        @keyframes heartpop {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.4); }
            100% { transform: scale(1); }
        }
        .fav-btn-detail.pop { animation: heartpop 0.3s ease; }
    </style>
</head>
<body>

<header class="sticky-top">
    <h1 class="text-center">Nano's Web Design Services</h1>
</header>

<nav class="navbar navbar-expand-md sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">🐾 Nano</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-2 mb-md-0">
                <li class="nav-item"><a class="nav-link" href="index.html#about">About</a></li>
                <li class="nav-item"><a class="nav-link" href="index.html#services">Services</a></li>
                <li class="nav-item"><a class="nav-link" href="index.html#welcome">Recipes</a></li>
                <li class="nav-item"><a class="nav-link" href="favorites.html">Favorites</a></li>
                <li class="nav-item"><a class="nav-link" href="index.html#media">Media</a></li>
                <li class="nav-item"><a class="nav-link" href="index.html#contact">Contact</a></li>
            </ul>
            <button id="theme-toggle" class="btn button-nano-ghost btn-sm ms-auto">Light Mode</button>
        </div>
    </div>
</nav>

<main class="container my-4" style="max-width: 900px;">
    <a href="index.html#recipes" class="btn button-nano-ghost btn-sm mb-4">&larr; Back to Recipes</a>
    <div id="recipe-detail">
        <p style="color: var(--text-dimmer);">Loading recipe...</p>
    </div>
</main>

<footer>
    <p class="mb-1">Nano is a good boy, some would even say the best boy, the greatest of doggos</p>
    <p class="mb-1">Site last updated: <time datetime="2026-02-20">February 20, 2026</time></p>
    <p class="mb-0"><a href="https://github.com/Grantsbb/FrontEndHTML5" target="_blank">Link to Code</a></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const savedTheme = localStorage.getItem("theme") || "dark";
    document.body.setAttribute("data-theme", savedTheme);
    document.getElementById("theme-toggle").textContent = savedTheme === "dark" ? "Light Mode" : "Dark Mode";
    document.getElementById("theme-toggle").addEventListener("click", () => {
        const current = localStorage.getItem("theme") || "dark";
        const next = current === "dark" ? "light" : "dark";
        document.body.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
        document.getElementById("theme-toggle").textContent = next === "dark" ? "Light Mode" : "Dark Mode";
    });

    const params = new URLSearchParams(window.location.search);
    const recipeId = parseInt(params.get("id"));
    let favorites = new Set(JSON.parse(localStorage.getItem("nano_favs") || "[]"));

    function saveFavs() {
        localStorage.setItem("nano_favs", JSON.stringify([...favorites]));
    }

    async function loadRecipe() {
        const response = await fetch("appetizer_recipes.json");
        const recipes = await response.json();
        const recipe = recipes.find(r => r.id === recipeId);
        if (!recipe) {
            document.getElementById("recipe-detail").innerHTML = "<p>Recipe not found.</p>";
            return;
        }
        document.title = recipe.name + " — Nano's Recipes";
        renderDetail(recipe);
    }
    loadRecipe();

    function renderDetail(recipe) {
        const isFaved = favorites.has(recipe.id);
        const container = document.getElementById("recipe-detail");
        container.innerHTML = `
            <section>
                <div class="d-flex align-items-start justify-content-between flex-wrap gap-2 mb-3">
                    <div>
                        <h3 style="margin-top:0;">${recipe.name}</h3>
                        <div>
                            <span class="meta-badge">${recipe.cuisine}</span>
                            <span class="meta-badge">${recipe.prep_time}</span>
                            <span class="meta-badge">${recipe.difficulty}</span>
                            <span class="meta-badge">${recipe.season}</span>
                            ${recipe.dietary.map(d => `<span class="dietary-badge">${d}</span>`).join("")}
                        </div>
                    </div>
                    <button class="fav-btn-detail ${isFaved ? "active" : ""}" id="fav-btn">
                        ${isFaved ? "♥ Saved" : "♡ Save Recipe"}
                    </button>
                </div>

                <img id="main-img" src="images/recipes/${recipe.images[0]}"
                     alt="${recipe.name}" class="detail-img"
                     onerror="this.style.display='none'">

                <div class="thumb-row">
                    ${recipe.images.map((img, i) => `
                        <img src="images/recipes/${img}" alt="${recipe.name} photo ${i+1}"
                             class="detail-img-thumb ${i === 0 ? "active" : ""}"
                             onclick="switchImg('images/recipes/${img}', this)"
                             onerror="this.style.display='none'">
                    `).join("")}
                </div>

                <div class="row">
                    <div class="col-12 col-md-4 mb-4">
                        <h3>Ingredients</h3>
                        <ul class="ingredients-list">
                            ${recipe.ingredients.map(ing => `<li>${ing}</li>`).join("")}
                        </ul>
                    </div>
                    <div class="col-12 col-md-8">
                        <h3>Instructions</h3>
                        ${recipe.steps.map((step, i) => `
                            <div class="step-item">
                                <div class="step-num">${i + 1}</div>
                                <div class="step-text">${step}</div>
                            </div>
                        `).join("")}
                    </div>
                </div>
            </section>
        `;

        document.getElementById("fav-btn").addEventListener("click", (e) => {
            const btn = e.currentTarget;
            if (favorites.has(recipe.id)) {
                favorites.delete(recipe.id);
                btn.textContent = "♡ Save Recipe";
                btn.classList.remove("active", "pop");
            } else {
                favorites.add(recipe.id);
                btn.textContent = "♥ Saved";
                btn.classList.remove("pop");
                void btn.offsetWidth;
                btn.classList.add("active", "pop");
            }
            saveFavs();
        });
    }

    function switchImg(src, thumb) {
        document.getElementById("main-img").src = src;
        document.querySelectorAll(".detail-img-thumb").forEach(t => t.classList.remove("active"));
        thumb.classList.add("active");
    }
</script>
</body>
</html>
